<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Painel da Secretaria — Assistente FAQ</title>
<style>
  :root{
    --ground:#eef2f4; --surface:#ffffff; --surface-2:#f4f7f8;
    --ink:#16232a; --ink-2:#5b6b73; --ink-3:#8a999f; --line:#dde5e8;
    --accent:#0f7c8a; --accent-d:#0b5b66; --accent-soft:#dcedef;
    --ok:#2f8f5b; --danger:#c0453b; --warn:#b9791a;
    --font:"Segoe UI",system-ui,-apple-system,Roboto,Helvetica,Arial,sans-serif;
    --mono:ui-monospace,"Cascadia Code","Roboto Mono",Menlo,Consolas,monospace;
  }
  @media (prefers-color-scheme:dark){
    :root{
      --ground:#0c1114; --surface:#151d21; --surface-2:#1c262b;
      --ink:#e7edef; --ink-2:#9aa8ad; --ink-3:#6a787d; --line:#26333a;
      --accent:#33b0bf; --accent-d:#7fd4de; --accent-soft:#123037;
      --ok:#48b579; --danger:#e2685a; --warn:#d8a23f;
    }
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--ground);color:var(--ink);font-family:var(--font);font-size:15px;line-height:1.5}
  .wrap{max-width:820px;margin:0 auto;padding:22px 18px 60px}
  a{color:var(--accent-d)}
  h1{font-size:20px;margin:0;font-weight:700;letter-spacing:-.01em}
  .muted{color:var(--ink-2)}
  button{font-family:inherit;cursor:pointer}
  .btn{border:0;border-radius:9px;padding:9px 15px;font-size:14px;font-weight:600;background:var(--accent);color:#fff}
  .btn:hover{background:var(--accent-d)}
  .btn.ghost{background:transparent;color:var(--ink-2);border:1px solid var(--line)}
  .btn.ghost:hover{background:var(--surface-2)}
  .btn.danger{background:transparent;color:var(--danger);border:1px solid var(--danger)}
  .btn.danger:hover{background:var(--danger);color:#fff}
  .btn:disabled{opacity:.5;cursor:not-allowed}

  /* login */
  #login{max-width:380px;margin:12vh auto 0;background:var(--surface);border:1px solid var(--line);
    border-radius:16px;padding:28px 24px;text-align:center}
  #login .crest{width:52px;height:52px;border-radius:13px;background:var(--accent);display:grid;place-items:center;margin:0 auto 14px}
  #login h1{font-size:18px}
  #login p{margin:6px 0 18px;font-size:13.5px}
  #login input{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:10px;background:var(--surface-2);
    color:var(--ink);font-family:var(--mono);font-size:14px;margin-bottom:12px}
  #login input:focus{outline:none;border-color:var(--accent)}
  #login .btn{width:100%}
  #loginErr{color:var(--danger);font-size:13px;min-height:18px;margin-top:8px}

  /* dashboard */
  header.bar{display:flex;align-items:center;gap:12px;margin-bottom:20px}
  header.bar .sub{font-size:12.5px;color:var(--ink-2);margin-top:2px}
  header.bar .spacer{flex:1}
  .tiles{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:22px}
  .tile{background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:15px 16px}
  .tile .k{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-3);font-weight:600}
  .tile .v{font-size:26px;font-weight:700;font-family:var(--mono);margin-top:5px}
  h2{font-size:13px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-2);margin:0 0 12px}

  .card{background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:16px 17px;margin-bottom:12px}
  .qrow{display:flex;gap:10px;align-items:flex-start}
  .qrow .q{flex:1;font-weight:600;font-size:15.5px}
  .badge{flex:0 0 auto;font-size:11.5px;font-weight:700;color:var(--accent-d);background:var(--accent-soft);
    padding:3px 9px;border-radius:20px;font-family:var(--mono)}
  .card .when{font-size:12px;color:var(--ink-3);margin-top:3px}
  .card textarea{width:100%;margin-top:12px;padding:10px 12px;border:1px solid var(--line);border-radius:10px;
    background:var(--surface-2);color:var(--ink);font-family:inherit;font-size:14.5px;resize:vertical;min-height:70px}
  .card textarea:focus{outline:none;border-color:var(--accent)}
  .actions{display:flex;gap:9px;margin-top:11px;justify-content:flex-end}
  .empty{text-align:center;color:var(--ink-2);padding:40px 0;font-size:15px}
  .foot{margin-top:26px;display:flex;gap:12px;flex-wrap:wrap;align-items:center;border-top:1px solid var(--line);padding-top:18px}

  #toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);opacity:0;
    background:var(--ink);color:var(--ground);padding:11px 18px;border-radius:10px;font-size:14px;
    transition:.25s;pointer-events:none;z-index:9}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .hidden{display:none!important}
</style>
</head>
<body>
<div class="wrap">
  <!-- LOGIN -->
  <div id="login">
    <div class="crest" aria-hidden="true">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18M5 21V9l7-5 7 5v12M9 21v-6h6v6"/></svg>
    </div>
    <h1>Painel da Secretaria</h1>
    <p class="muted">Informe o token de acesso para continuar.</p>
    <input id="token" type="password" placeholder="Token de administração" autocomplete="off" aria-label="Token">
    <button class="btn" id="loginBtn" type="button">Entrar</button>
    <div id="loginErr" aria-live="polite"></div>
  </div>

  <!-- DASHBOARD -->
  <div id="dash" class="hidden">
    <header class="bar">
      <div>
        <h1>Perguntas sem resposta</h1>
        <div class="sub">Assistente FAQ · Secretaria da Fazenda</div>
      </div>
      <div class="spacer"></div>
      <button class="btn ghost" id="refreshBtn" type="button">Atualizar</button>
      <button class="btn ghost" id="logoutBtn" type="button">Sair</button>
    </header>

    <div class="tiles">
      <div class="tile"><div class="k">Sem resposta</div><div class="v" id="tPend">—</div></div>
      <div class="tile"><div class="k">No cache</div><div class="v" id="tCache">—</div></div>
      <div class="tile"><div class="k">Taxa de acerto</div><div class="v" id="tHit">—</div></div>
    </div>

    <h2>Fila de perguntas</h2>
    <div id="list"></div>

    <div class="foot">
      <button class="btn danger" id="clearBtn" type="button">Limpar cache</button>
      <span class="muted" style="font-size:13px">Use após atualizar um PDF da FAQ.</span>
      <div class="spacer" style="flex:1"></div>
      <a href="/relatorio" target="_blank" rel="noopener">Ver relatório de capacidade →</a>
    </div>
  </div>
</div>
<div id="toast" role="status"></div>

<script>
  const API = "";
  const KEY = "faq_admin_token";
  const $ = s => document.querySelector(s);
  let token = localStorage.getItem(KEY) || "";

  function toast(msg){ const t=$("#toast"); t.textContent=msg; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),2600); }

  async function api(path, {method="GET", body=null}={}){
    const opt={method, headers:{"Authorization":"Bearer "+token}};
    if(body){ opt.headers["Content-Type"]="application/json"; opt.body=JSON.stringify(body); }
    const r = await fetch(API+path, opt);
    if(r.status===401){ logout(); throw new Error("401"); }
    if(!r.ok) throw new Error("HTTP "+r.status);
    return r.json();
  }

  function showLogin(){ $("#dash").classList.add("hidden"); $("#login").classList.remove("hidden"); }
  function showDash(){ $("#login").classList.add("hidden"); $("#dash").classList.remove("hidden"); }
  function logout(){ localStorage.removeItem(KEY); token=""; showLogin(); }

  async function doLogin(){
    token = $("#token").value.trim();
    if(!token) return;
    $("#loginErr").textContent="";
    try{
      await api("/stats");                     // valida o token
      localStorage.setItem(KEY, token);
      showDash(); loadAll();
    }catch(e){
      $("#loginErr").textContent = e.message==="401" ? "Token inválido." : "Falha ao conectar.";
    }
  }

  async function loadStats(){
    const s = await api("/stats");
    $("#tCache").textContent = s.cache_size;
    $("#tHit").textContent = Math.round((s.hit_rate||0)*100)+"%";
  }

  async function loadUnanswered(){
    const {unanswered} = await api("/unanswered");
    $("#tPend").textContent = unanswered.length;
    const list = $("#list");
    list.innerHTML = "";
    if(!unanswered.length){ list.innerHTML = '<div class="empty">Nenhuma pergunta pendente 🎉</div>'; return; }
    unanswered.forEach(u => list.appendChild(cardFor(u)));
  }

  function cardFor(u){
    const c = document.createElement("div"); c.className="card";
    const head = document.createElement("div"); head.className="qrow";
    const q = document.createElement("div"); q.className="q"; q.textContent = u.question;
    const b = document.createElement("span"); b.className="badge"; b.textContent = "×"+u.count;
    head.append(q,b);
    const when = document.createElement("div"); when.className="when"; when.textContent = "última vez: "+u.last_seen;
    const ta = document.createElement("textarea"); ta.placeholder = "Escreva a resposta oficial…";
    const act = document.createElement("div"); act.className="actions";
    const ign = document.createElement("button"); ign.className="btn ghost"; ign.textContent="Ignorar"; ign.type="button";
    const pub = document.createElement("button"); pub.className="btn"; pub.textContent="Publicar resposta"; pub.type="button";
    act.append(ign,pub);
    c.append(head,when,ta,act);

    pub.addEventListener("click", async ()=>{
      const answer = ta.value.trim();
      if(answer.length<2){ toast("Escreva a resposta primeiro."); return; }
      pub.disabled=true; ign.disabled=true; pub.textContent="Publicando…";
      try{
        await api("/answer",{method:"POST",body:{question:u.question, answer}});
        toast("Resposta publicada — o bot já responde essa pergunta.");
        c.remove(); loadStats(); refreshPendCount(-1);
      }catch(e){ toast("Erro ao publicar."); pub.disabled=false; ign.disabled=false; pub.textContent="Publicar resposta"; }
    });
    ign.addEventListener("click", async ()=>{
      ign.disabled=true; pub.disabled=true;
      try{ await api("/unanswered/dismiss",{method:"POST",body:{question:u.question}}); c.remove(); refreshPendCount(-1); }
      catch(e){ toast("Erro ao remover."); ign.disabled=false; pub.disabled=false; }
    });
    return c;
  }

  function refreshPendCount(delta){
    const el=$("#tPend"); const n=parseInt(el.textContent)||0; el.textContent=Math.max(0,n+delta);
    if(n+delta<=0) $("#list").innerHTML='<div class="empty">Nenhuma pergunta pendente 🎉</div>';
  }

  async function loadAll(){ try{ await loadStats(); await loadUnanswered(); }catch(e){} }

  $("#clearBtn").addEventListener("click", async ()=>{
    if(!confirm("Limpar todo o cache de respostas? Use após atualizar um PDF.")) return;
    try{ await api("/cache/clear",{method:"POST"}); toast("Cache limpo."); loadStats(); }catch(e){ toast("Erro ao limpar."); }
  });
  $("#loginBtn").addEventListener("click", doLogin);
  $("#token").addEventListener("keydown", e=>{ if(e.key==="Enter") doLogin(); });
  $("#refreshBtn").addEventListener("click", loadAll);
  $("#logoutBtn").addEventListener("click", logout);

  // auto-login se ja houver token salvo
  if(token){ api("/stats").then(()=>{ showDash(); loadAll(); }).catch(()=>showLogin()); }
  else showLogin();
</script>
</body>
</html>
