  :root[data-theme="light"]{
    --header-bg:#f0f2f5; --header-ink:#111b21; --header-sub:#667781;
    --chat-bg:#efeae2; --dot:rgba(11,20,26,.04);
    --in-bg:#ffffff; --in-ink:#111b21; --out-bg:#d9fdd3; --out-ink:#111b21;

  }
  :root[data-theme="dark"]{
    --header-bg:#202c33; --header-ink:#e9edef; --header-sub:#8696a0;
    --chat-bg:#0b141a; --dot:rgba(255,255,255,.02);
    --in-bg:#202c33; --in-ink:#e9edef; --out-bg:#005c4b; --out-ink:#e9edef;
    --meta:#8696a0; --composer-bg:#202c33; --input-bg:#2a3942; --input-ink:#e9edef;
    --icon:#8696a0; --line:rgba(255,255,255,.08); --doodle:var(--doodle-d);
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--header-bg);font-family:var(--font);display:flex;justify-content:center;min-height:100dvh}
  .app{width:100%;max-width:520px;height:100dvh;display:flex;flex-direction:column;position:relative;overflow:hidden;background:var(--chat-bg)}
  /* desktop: janela de chat centralizada e enquadrada */
  @media (min-width:560px){
    body{align-items:center;padding:22px}
    .app{height:min(900px,calc(100dvh - 44px));border-radius:14px;box-shadow:0 12px 40px rgba(0,0,0,.22)}
  }

  /* ---------- header ---------- */
  header{background:var(--header-bg);color:var(--header-ink);display:flex;align-items:center;gap:12px;
    padding:9px 14px;padding-top:max(9px,env(safe-area-inset-top));z-index:3;box-shadow:0 1px 0 var(--line)}
  .avatar{width:40px;height:40px;border-radius:50%;background:#fff;flex:0 0 auto;overflow:hidden}
  .avatar img{width:100%;height:100%;object-fit:cover;display:block}
  .htext{flex:1;min-width:0}
  .htext h1{margin:0;font-size:16px;font-weight:600;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .htext p{margin:1px 0 0;font-size:12.5px;color:var(--header-sub)}
  .hicons{display:flex;gap:20px;color:var(--icon)}
  .hicons svg{width:21px;height:21px}

  /* ---------- chat ---------- */
  .chat{flex:1;overflow-y:auto;padding:14px 7% 10px;background-color:var(--chat-bg);
    background-image:var(--doodle);background-size:280px;
    display:flex;flex-direction:column;gap:6px;scroll-behavior:smooth}
  .msg{position:relative;max-width:80%;padding:6px 9px 8px;font-size:14.6px;line-height:1.32;
    white-space:pre-wrap;word-wrap:break-word;box-shadow:0 1px .5px rgba(11,20,26,.13);animation:pop .16s ease-out}
  @keyframes pop{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  .msg.bot{align-self:flex-start;background:var(--in-bg);color:var(--in-ink);border-radius:0 8px 8px 8px}
  .msg.user{align-self:flex-end;background:var(--out-bg);color:var(--out-ink);border-radius:8px 0 8px 8px}
  .msg.bot::after{content:"";position:absolute;top:0;left:-8px;width:8px;height:13px;background:var(--in-bg);
    clip-path:polygon(100% 0,0 0,100% 100%)}
  .msg.user::after{content:"";position:absolute;top:0;right:-8px;width:8px;height:13px;background:var(--out-bg);
    clip-path:polygon(0 0,100% 0,0 100%)}
  .msg .meta{display:inline-flex;align-items:center;gap:3px;float:right;margin:6px 0 -2px 10px;
    font-size:11px;color:var(--meta);user-select:none}
  .msg .meta svg{width:15px;height:11px;color:#53bdeb}
  .msg.err{align-self:center;background:#fdecea;color:#b0413a;border-radius:8px;font-size:13px;box-shadow:none}

  .typing{align-self:flex-start;background:var(--in-bg);border-radius:0 8px 8px 8px;padding:12px 14px;
    box-shadow:0 1px .5px rgba(11,20,26,.13);display:flex;gap:4px;position:relative}
  .typing::after{content:"";position:absolute;top:0;left:-8px;width:8px;height:13px;background:var(--in-bg);clip-path:polygon(100% 0,0 0,100% 100%)}
  .typing span{width:7px;height:7px;border-radius:50%;background:var(--meta);opacity:.5;animation:blink 1.3s infinite}
  .typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
  @keyframes blink{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:.85;transform:translateY(-3px)}}

  .suggest{display:flex;flex-wrap:wrap;gap:7px;padding:2px 7% 8px;background:var(--chat-bg)}
  .chip{border:1px solid var(--wa-green);background:transparent;color:var(--wa-green);font-size:13px;
    padding:6px 13px;border-radius:16px;cursor:pointer;font-family:inherit}
  .chip:hover{background:var(--wa-green);color:#fff}
  .chip:focus-visible{outline:2px solid var(--wa-green);outline-offset:2px}

  /* ---------- composer ---------- */
  .composer{background:var(--composer-bg);padding:8px 12px;padding-bottom:max(8px,env(safe-area-inset-bottom));
    display:flex;gap:8px;align-items:flex-end}
  .composer .ibox{flex:1;display:flex;align-items:flex-end;gap:8px;background:var(--input-bg);border-radius:22px;padding:8px 12px}
  .composer .ibox svg{width:22px;height:22px;color:var(--icon);flex:0 0 auto;margin-bottom:2px}
  .composer textarea{flex:1;resize:none;border:0;background:transparent;color:var(--input-ink);
    font-family:inherit;font-size:15px;line-height:1.35;max-height:110px;outline:none}
  .send{flex:0 0 auto;width:46px;height:46px;border:0;border-radius:50%;background:var(--wa-green);color:#fff;
    cursor:pointer;display:grid;place-items:center}
  .send:hover{background:var(--wa-green-d)}
  .send:disabled{opacity:.5;cursor:not-allowed}
  .send:focus-visible{outline:2px solid #fff;outline-offset:-4px}
  .send svg{width:22px;height:22px}
  /* celular estreito: mais espaco para o titulo */
  @media (max-width:480px){ .hicons{display:none} .htext h1{font-size:15px} }
  @media (prefers-reduced-motion:reduce){*{animation:none!important;scroll-behavior:auto}}
</style>
</head>
<body>
  <div class="app">
    <header>
      <div class="avatar">
        <img src="/static/aju.png" alt="Prefeitura de Aracaju">
      </div>
      <div class="htext">
        <h1>Assistente Virtual — Prefeitura de Aracaju</h1>
        <p id="hstatus">online</p>
      </div>
      <div class="hicons" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="19" r="2"/></svg>
      </div>
    </header>

    <main class="chat" id="chat" aria-live="polite" aria-label="Conversa"></main>

    <div class="suggest" id="suggest" aria-label="Perguntas sugeridas">
      <button class="chip">Qual a alíquota do ISSQN pela Lei 183?</button>
      <button class="chip">O MEI pode pedir o benefício?</button>
      <button class="chip">O protocolo de intenções é um contrato?</button>
    </div>

    <form class="composer" id="form">
      <div class="ibox">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M8 14s1.5 2 4 2 4-2 4-2M9 9h.01M15 9h.01" stroke-linecap="round"/></svg>
        <textarea id="input" rows="1" placeholder="Digite uma mensagem" autocomplete="off" aria-label="Sua pergunta"></textarea>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21.4 11.05 12.25 20.2a5 5 0 0 1-7.07-7.07l9.19-9.19a3 3 0 0 1 4.24 4.24l-9.2 9.19a1 1 0 0 1-1.41-1.41l8.48-8.49"/></svg>
      </div>
      <button class="send" id="send" type="submit" aria-label="Enviar">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M3 20.5 21 12 3 3.5 3 10l12 2-12 2z"/></svg>
      </button>
    </form>
  </div>

<script>
  const API_BASE = "";                       // mesma origem (servido pelo microservico)
  const chat = document.getElementById("chat");
  const form = document.getElementById("form");
  const input = document.getElementById("input");
  const send = document.getElementById("send");
  const suggest = document.getElementById("suggest");
  const hstatus = document.getElementById("hstatus");
  let busy = false;

  const now = () => new Date().toLocaleTimeString("pt-BR", {hour:"2-digit", minute:"2-digit"});
  const TICKS = '<svg viewBox="0 0 18 13" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M1 7l3.5 3.5L11 4"/><path d="M6.5 10.5 7 10l6-6"/></svg>';

  function bubble(text, cls){
    const d = document.createElement("div");
    d.className = "msg " + cls;
    d.textContent = text;
    if(cls !== "err"){
      const m = document.createElement("span");
      m.className = "meta";
      m.innerHTML = now() + (cls === "user" ? " " + TICKS : "");
      d.appendChild(m);
    }
    chat.appendChild(d);
    chat.scrollTop = chat.scrollHeight;
    return d;
  }
  function typing(){
    const d = document.createElement("div");
    d.className = "typing"; d.innerHTML = "<span></span><span></span><span></span>";
    chat.appendChild(d); chat.scrollTop = chat.scrollHeight; return d;
  }

  async function ask(question){
    if(busy || !question.trim()) return;
    busy = true; send.disabled = true; input.value = ""; input.style.height = "auto";
    suggest.style.display = "none";
    bubble(question, "user");
    hstatus.textContent = "digitando…";
    const t = typing();
    try{
      const r = await fetch(API_BASE + "/ask", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({question})
      });
      if(!r.ok) throw new Error("HTTP " + r.status);
      const data = await r.json();
      t.remove();
      bubble(data.answer || "Não consegui responder agora.", "bot");
    }catch(e){
      t.remove();
      bubble("Não consegui consultar agora. Tente novamente em instantes.", "err");
    }finally{
      busy = false; send.disabled = false; hstatus.textContent = "online"; input.focus();
    }
  }

  form.addEventListener("submit", e => { e.preventDefault(); ask(input.value); });
  input.addEventListener("input", () => { input.style.height="auto"; input.style.height = Math.min(input.scrollHeight,110)+"px"; });
  input.addEventListener("keydown", e => { if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); ask(input.value); } });
  async function loadSuggestions(){
    try{
      const r = await fetch(API_BASE + "/suggestions?n=3");
      if(!r.ok) return;
      const {suggestions} = await r.json();
      if(!Array.isArray(suggestions) || !suggestions.length) return;
      suggest.innerHTML = "";
      suggestions.forEach(q => {
        const b = document.createElement("button");
        b.className = "chip"; b.type = "button"; b.textContent = q;
        b.addEventListener("click", () => ask(q));
        suggest.appendChild(b);
      });
    }catch(e){ /* mantém os chips padrão do HTML como fallback */ }
  }
  // fallback: liga os chips padrão do HTML; depois tenta trocar pelos mais frequentes
  suggest.querySelectorAll(".chip").forEach(c => c.addEventListener("click", () => ask(c.textContent)));
  loadSuggestions();

  bubble("Olá! 👋 Sou o assistente virtual da Prefeitura de Aracaju. Como posso ajudar?", "bot");
</script>
</body>
</html>
